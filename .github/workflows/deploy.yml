name: Deploy Documentation
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies for PDF (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y weasyprint

      - name: Install Python Dependencies
        run: |
          pip install mkdocs-material mkdocs-pdf-export-plugin

      - name: Pre-Build to generate PDF
        run: |
          mkdocs build
          # Das generierte PDF wird aus dem site-Ordner gerettet und in den docs-Ordner für die Webseite kopiert
          # Falls das PDF anders heißt, passe den Namen kurz an (meistens site_name.pdf)
          mkdir -p docs/pdf
          cp site/*.pdf docs/pdf/technische_dokumentation.pdf 2>/dev/null || cp site/pdf/*.pdf docs/pdf/technische_dokumentation.pdf 2>/dev/null || true

      - name: Build and Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force