name: Deploy Documentation
on:
  push:
    branches:
      - main # Oder master, je nachdem wie dein Hauptbranch heißt

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies for PDF (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y weasyprint

      - name: Install Python Dependencies
        run: |
          pip install mkdocs-material mkdocs-pdf-export-plugin

      - name: Un-comment PDF Plugin for Build
        run: |
          # Dieses kleine Skript entfernt die Raute vor dem PDF-Plugin nur für den Build auf GitHub!
          sed -i 's/#  - pdf-export:/- pdf-export:/g' mkdocs.yml
          sed -i 's/#      combined: true/    combined: true/g' mkdocs.yml

      - name: Build and Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force