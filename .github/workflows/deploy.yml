name: Deploy Documentation
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies for PDF (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y weasyprint

      - name: Install Python Dependencies
        run: |
          pip install mkdocs-material mkdocs-pdf-export-plugin

      - name: Pre-Build to generate PDF
        run: |
          # 1. Den downloads-Ordner erstellen, BEVOR der finale Deploy-Build läuft
          mkdir -p docs/downloads
          
          # 2. Einmal lokal im Runner bauen, damit das PDF-Plugin die Datei erzeugt
          mkdocs build
          
          # 3. Das erzeugte PDF suchen und exakt benannt in docs/downloads/ sichern
          find site/ -name "*.pdf" -exec cp {} docs/downloads/X19e_Technische_Dokumentation.pdf \;

      - name: Build and Deploy to GitHub Pages
        run: |
          # 4. Jetzt erst den offiziellen Deploy ausführen. 
          # MkDocs findet jetzt das PDF im docs/downloads/-Ordner und lädt es hoch.
          mkdocs gh-deploy --force