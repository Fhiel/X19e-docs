name: Deploy Documentation
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies for PDF (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y weasyprint

      - name: Install Python Dependencies
        run: |
          pip install mkdocs-material mkdocs-with-pdf

      - name: Pre-Build to generate PDF
        run: |
          mkdir -p docs/downloads
          mkdocs build
          # mkdocs-with-pdf legt das fertige Dokument direkt als "document.pdf" in site/ ab
          cp site/pdf/document.pdf docs/downloads/X19e_Technische_Dokumentation.pdf 2>/dev/null || cp site/document.pdf docs/downloads/X19e_Technische_Dokumentation.pdf 2>/dev/null || find site/ -name "*.pdf" -exec cp {} docs/downloads/X19e_Technische_Dokumentation.pdf \;

      - name: Build and Deploy to GitHub Pages
        run: |
          mkdocs gh-deploy --force